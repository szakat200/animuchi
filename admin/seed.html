    const logEl = document.getElementById('log');
    function log(msg, cls = '') {
      logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    document.getElementById('seedBtn').addEventListener('click', async () => {
      const email = prompt('Введи email от админки:');
      const pass = prompt('Введи пароль:');
      if (!email || !pass) return;

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        log('✅ Авторизация успешна', 'ok');
      } catch (e) {
        log('❌ Ошибка авторизации: ' + e.message, 'err');
        return;
      }

      // Удаляем все старые товары
      log('🗑️ Удаляю старые товары...');
      try {
        const snap = await getDocs(collection(db, 'products'));
        let deleted = 0;
        for (const d of snap.docs) {
          await deleteDoc(doc(db, 'products', d.id));
          deleted++;
        }
        log(`✅ Удалено ${deleted} старых товаров`, 'ok');
      } catch (e) {
        log('⚠️ Ошибка при удалении: ' + e.message, 'err');
      }

      // Загружаем новые
      log(`📦 Загружаю ${PRODUCTS.length} товаров...`);
      let ok = 0, fail = 0;
      for (const p of PRODUCTS) {
        try {
          await addDoc(collection(db, 'products'), {
            ...p,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
          });
          log(`✅ ${p.name}`, 'ok');
          ok++;
        } catch (e) {
          log(`❌ ${p.name}: ${e.message}`, 'err');
          fail++;
        }
      }

      log(`<br><strong>🎉 Готово! Загружено: ${ok}, ошибок: ${fail}</strong>`, ok > 0 ? 'ok' : 'err');
      log(`<br>Открой каталог и проверь фотки!`);
    });
